<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#042f2e"/>
  <!-- Pencil body -->
  <g transform="translate(50,50) rotate(135) translate(-8,-40)">
    <!-- Shaft -->
    <rect x="0" y="0" width="16" height="50" rx="1.5" fill="#a855f7"/>
    <!-- Top band -->
    <rect x="0" y="0" width="16" height="7" rx="1.5" fill="#7c3aed"/>
    <!-- Ferrule -->
    <rect x="0" y="44" width="16" height="6" fill="#5eead4"/>
    <!-- Wood taper -->
    <polygon points="0,50 16,50 8,68" fill="#2dd4bf"/>
    <!-- Lead tip -->
    <polygon points="5,62 11,62 8,70" fill="#fafafa"/>
  </g>
</svg>
